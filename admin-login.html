<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — BunchFeed</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .box {
      background: #1c1f2e;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 60px rgba(0,0,0,.5);
    }
    .logo {
      font-family: Georgia, serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }
    .logo span { color: #c8212a; }
    .subtitle {
      font-size: .82rem;
      color: rgba(255,255,255,.4);
      margin-bottom: 36px;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: rgba(255,255,255,.6);
      margin-bottom: 7px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,.06);
      border: 1.5px solid rgba(255,255,255,.1);
      border-radius: 8px;
      color: #fff;
      font-size: .95rem;
      font-family: inherit;
      outline: none;
      margin-bottom: 20px;
      transition: border-color .2s;
    }
    input:focus { border-color: #c8212a; }
    input::placeholder { color: rgba(255,255,255,.25); }
    button {
      width: 100%;
      padding: 13px;
      background: #c8212a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background .2s, transform .15s;
      margin-top: 4px;
    }
    button:hover { background: #a81820; transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    .error-msg {
      background: rgba(200,33,42,.15);
      border: 1px solid rgba(200,33,42,.4);
      border-radius: 8px;
      color: #f87171;
      font-size: .85rem;
      padding: 10px 14px;
      margin-bottom: 20px;
      display: none;
    }
    .error-msg.show { display: block; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">Bunch<span>Feed</span></div>
    <div class="subtitle">Admin Access</div>
    <div class="error-msg" id="error">Incorrect email or password.</div>
    <form id="form">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="admin@bunchfeed.com" autocomplete="username" />
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      <button type="submit" id="btn">Sign In to CMS</button>
    </form>
  </div>
  <script>
    document.getElementById('form').addEventListener('submit', function(e) {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const error    = document.getElementById('error');
      const btn      = document.getElementById('btn');

      if (email === 'admin@bunchfeed.com' && password === 'admin123') {
        btn.textContent = 'Signing in…';
        btn.disabled = true;
        localStorage.setItem('bf_admin_auth', 'true');
        localStorage.setItem('bf_user', JSON.stringify({ email: 'admin@bunchfeed.com', name: 'Admin' }));
        window.location.href = 'admin.html';
      } else {
        error.classList.add('show');
      }
    });

    // Hide error when user starts typing
    ['email','password'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', function() {
        document.getElementById('error').classList.remove('show');
      });
    });
  </script>
</body>
</html>
